<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atmolibria | Самопочуття та Погода</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <div class="gradient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
      
      <main class="container">
        <header class="site-header">
          <h1>Atmolibria</h1>
          <p class="site-subtitle">Аналіз впливу погоди на самопочуття.</p>
        </header>

        <section class="wellbeing-card capsule">
          <h2 class="label">Індекс самопочуття</h2>
          <div class="score-container">
            <div id="score" class="score-value">--%</div>
            <div id="status-text" class="status">Завантаження даних...</div>
          </div>
          <p id="location" class="location-text">Харків (за замовчуванням)</p>
          <div class="split-lists">
            <div id="breakdown-container" class="breakdown-list"></div>
            <div id="symptoms-container" class="symptoms-list"></div>
          </div>
        </section>

        <section class="forecast-section capsule">
          <h2 class="section-title">Прогноз на 3 дні</h2>
          <div id="forecast-container" class="forecast-grid">
            <div class="status" style="text-align:center; width:100%;">Завантаження прогнозу...</div>
          </div>
        </section>

        <div class="bottom-controls">
          <button id="geo-btn" class="capsule-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            Оновити геопозицію
          </button>
        </div>

        <footer class="site-footer">
          <p>Created by Octopus Better</p>
        </footer>

      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
